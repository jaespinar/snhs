<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Sorsogon National High School</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
            rel="stylesheet"
        />
        <link href="assets/theme.css" rel="stylesheet" />
        <link rel="icon" type="image/png" href="assets/logo.ico" />
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-admin py-3">
            <div class="container">
                <!-- SCHOOL LOGO SLOT -->
                <a class="navbar-brand d-flex align-items-center gap-3" href="admin-dashboard.html">
                    <div class="brand-badge">
                        <img src="assets/logo.jpg" class="w-100 h-100 rounded-3">
                    </div>
                    <div>
                        <div class="brand-text">Sorsogon National High School</div>
                        <div class="brand-sub">Enrollment Portal</div>
                    </div>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div id="adminNav" class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto top-menu align-items-lg-center">
                        <li class="nav-item">
                            <a class="nav-link" href="admin-dashboard.html"
                                ><i class="bi bi-speedometer2 me-2 ms-2"></i> Dashboard&nbsp;&nbsp;</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="admin-school-year.html"
                                ><i class="bi bi-calendar me-2 ms-2"></i> School Year&nbsp;&nbsp;</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="admin-enrollees.html"
                                ><i class="bi bi-mortarboard me-2 ms-2"></i> Enrollees&nbsp;&nbsp;</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="admin-sections.html"
                                ><i class="bi bi-person-vcard me-2 ms-2"></i> Sections&nbsp;&nbsp;</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="admin-users.html"
                                ><i class="bi bi-people-fill me-2 ms-2"></i> Users&nbsp;&nbsp;</a
                            >
                        </li>

                        <li class="nav-item dropdown ms-lg-2">
                            <a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle me-2 ms-2"></i> Account
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li>
                                    <a class="dropdown-item" href="admin-settings.html"><i class="bi bi-gear me-2"></i> Settings</a>
                                </li>
                                <li><hr class="dropdown-divider" /></li>
                                <li>
                                    <a class="dropdown-item" href="index.html"
                                        ><i class="bi bi-power me-2"></i> Logout</a
                                    >
                                </li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container py-4 py-lg-5">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-2 mb-4">
                <div>
                    <h2 class="page-title mb-1">Account</h2>
                </div>
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <a class="btn btn-brand rounded-pill px-4" href="#" data-bs-toggle="modal" data-bs-target="#NewModal">
                        <i class="bi bi-check ms-1"></i> Save Changes
                    </a>
                </div>
            </div>
            <div class="card card-elev p-3 p-lg-4">
                <div class="row g-4">
                    <div class="col-md-4">
                        <label class="form-label">Current Password</label>
                        <input class="form-control" required placeholder="Enter Current Password"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">New Password</label>
                        <input class="form-control" required placeholder="Enter New Password"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Confirm New Password</label>
                        <input class="form-control" required placeholder="Enter New Password"/>
                    </div>
                </div>
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
